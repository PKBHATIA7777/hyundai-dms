# ============================================
# Database Connection Configuration
# ============================================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3322/dms}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ============================================
# JPA / Hibernate Settings
# ============================================
# ddl-auto: 'update' will create/update tables automatically when you run the app
# Other options: none, validate, create, create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Optional: Format SQL for better readability in logs
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Settings
# ============================================
hyundai.dms.jwtSecret=${JWT_SECRET:hyundaiDealerManagementSystemSecretKeyMustBeVeryLongAndSecure123456}
hyundai.dms.jwtExpirationMs=86400000

# ============================================
# Account Locking Configuration
# ============================================
app.security.max-failed-attempts=5
# Lock duration in milliseconds (24 hours = 86400000)
app.security.lock-duration=86400000

# ============================================
# Jackson Configuration
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================
# HikariCP Connection Pool
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# Production Notes
# ============================================
# For production, override using environment variables:
#   SPRING_JPA_HIBERNATE_DDL_AUTO=validate
#   SPRING_JPA_SHOW_SQL=false



spring.jpa.open-in-view=true




logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate=ERROR
logging.level.com.example.demo=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always
logging.level.org.springframework.security=DEBUG