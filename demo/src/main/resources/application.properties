# ============================================
# Database Connection Configuration
# ============================================
spring.datasource.url=jdbc:mariadb://localhost:3322/dms
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ============================================
# JPA / Hibernate Settings
# ============================================
# ddl-auto: 'update' will create/update tables automatically when you run the app
# Other options: none, validate, create, create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Optional: Format SQL for better readability in logs
spring.jpa.properties.hibernate.format_sql=true